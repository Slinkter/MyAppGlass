<!doctype html>
<html lang="es" data-theme="light" style="color-scheme: light;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <title>GYA Glass & Aluminum | Innovación en Cerramientos de Vidrio</title>

    <!-- SEO & Indexing -->
    <meta name="description" content="Líderes en diseño e instalación de soluciones premium en vidrio y aluminio: ventanas acústicas, mamparas, puertas de ducha y fachadas de alta gama." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="GYA Company" />

    <!-- Theme Color Strategy (Pre-load flash prevention) -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme') || 'light';
          if (theme === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
          // Aplicar fondo inmediato según el sistema Aura
          var bgColor = theme === 'dark' ? '#09090b' : '#fafafa';
          document.documentElement.style.backgroundColor = bgColor;
        } catch (e) {}
      })();
    </script>

    <!-- Optimized Fonts Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet" />

    <!-- Favicon Strategy -->
    <link rel="icon" type="image/png" href="/logovcr.png" />
    <link rel="apple-touch-icon" href="/logovcr.png" />

    <!-- Open Graph / Redes Sociales -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="GYA Glass & Aluminum | Arquitectura en Vidrio" />
    <meta property="og:description" content="Soluciones arquitectónicas de alta precisión en vidrio y aluminio para residencias y proyectos comerciales." />
    <meta property="og:image" content="https://gyacompany.com/logovcr.png" />
    <meta property="og:url" content="https://www.gyacompany.com" />

    <!-- JSON-LD Structured Data: Local Business Elite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "GYA Glass & Aluminum S.A.C.",
        "alternateName": "GYA Company",
        "url": "https://www.gyacompany.com",
        "logo": "https://gyacompany.com/logovcr.png",
        "description": "Especialistas en estructuras de aluminio y cristalería de seguridad en La Molina, Lima.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Av. Los Fresnos Mz H Lt 16",
          "addressLocality": "La Molina",
          "addressRegion": "Lima",
          "postalCode": "15024",
          "addressCountry": "PE"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+51-974-278-303",
          "contactType": "sales",
          "areaServed": "PE",
          "availableLanguage": "Spanish"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <style>
      /* Estilos básicos de carga para prevenir saltos visuales hasta que el CSS de Chakra cargue */
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        font-family: 'Lora', serif;
      }
    </style>
  </body>
</html>
